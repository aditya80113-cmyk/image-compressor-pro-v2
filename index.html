<!DOCTYPE html>
<html>
<body>

<h2>AI Video Editor</h2>

<input type="file" id="video">
<button onclick="upload()">Upload & Edit</button>

<p id="msg"></p>

<script>
async function upload() {
  let file = document.getElementById("video").files[0];

  let formData = new FormData();
  formData.append("video", file);

  document.getElementById("msg").innerText = "Processing...";

  let res = await fetch("https://YOUR-SERVER.onrender.com/upload", {
    method: "POST",
    body: formData
  });

  let data = await res.json();
  document.getElementById("msg").innerText = "Done ✅";
}
</script>

</body>
</html>
